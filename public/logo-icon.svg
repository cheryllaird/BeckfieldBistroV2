<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black background circle -->
  <circle cx="256" cy="256" r="256" fill="#111111"/>

  <!-- Subtle white ring border -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="white" stroke-width="5" opacity="0.15"/>

  <!-- FORK: centered at crossing point (256,178), rotated -28deg -->
  <g transform="translate(256,178) rotate(-28)">
    <!-- Left tine -->
    <rect x="-16" y="-108" width="8" height="92" rx="4" fill="#FFD100"/>
    <!-- Center tine -->
    <rect x="-4" y="-108" width="8" height="92" rx="4" fill="#FFD100"/>
    <!-- Right tine -->
    <rect x="8" y="-108" width="8" height="92" rx="4" fill="#FFD100"/>
    <!-- Tine base connector -->
    <rect x="-16" y="-20" width="40" height="9" rx="3" fill="#FFD100"/>
    <!-- Handle shaft -->
    <rect x="-5" y="-11" width="10" height="93" rx="5" fill="#FFD100"/>
  </g>

  <!-- SPATULA: centered at crossing point (256,178), rotated +28deg -->
  <g transform="translate(256,178) rotate(28)">
    <!-- Blade body -->
    <rect x="-18" y="-115" width="36" height="95" rx="5" fill="#FFD100"/>
    <!-- Blade holes -->
    <rect x="-12" y="-104" width="9" height="11" rx="3" fill="#111111"/>
    <rect x="3" y="-104" width="9" height="11" rx="3" fill="#111111"/>
    <rect x="-12" y="-86" width="9" height="11" rx="3" fill="#111111"/>
    <rect x="3" y="-86" width="9" height="11" rx="3" fill="#111111"/>
    <!-- Neck -->
    <rect x="-5" y="-22" width="10" height="28" rx="3" fill="#FFD100"/>
    <!-- Handle -->
    <rect x="-5" y="6" width="10" height="76" rx="5" fill="#FFD100"/>
  </g>

  <!-- "BB" text - white, bold -->
  <text
    x="256"
    y="408"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Impact, Helvetica, sans-serif"
    font-size="192"
    font-weight="900"
    fill="white"
    letter-spacing="-8"
  >BB</text>
</svg>
